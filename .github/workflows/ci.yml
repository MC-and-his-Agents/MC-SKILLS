name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  readme-directories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check README directories
        run: python3 scripts/render-plugin-directory.py --check
