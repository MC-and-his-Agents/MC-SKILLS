interface:
  display_name: "调度线程编排"
  short_description: "创建维护 scheduler lifecycle、scheduler pool 和 shared lane locks"
  default_prompt: "使用 $codex-scheduler-watcher 创建或更新 meta-scheduler watcher automation：默认中文输出，并为机器字段保留英文；为 milestone、parent issue、issue set、PR/PR set、repo carrier 或手工目标维护 coordination unit graph、candidate graph、scheduler pool、shared lane lock table 和 waiting queue，完整运行时状态写入 /Users/<username>/orchestration/<project>/<round-or-unit>/state/，完整 scheduler/lane report 写入 reports/*.json，跨线程只传 locator-only notice；按 dependency edge 做 partial-order scheduling，未满足 hard dependency 只阻塞消费它的 scoped subset；在证明候选 scope 可启动、容量、可观测性、orchestration carrier 可消费性和 lane budget 足够时并行创建 implementation-only scheduler；进入 shared carrier/status/review/gate/merge/contract lane 前必须由 watcher 发 lane_grant；旧 scheduler retired/systemError/abandoned 后 lane grant 不自动继承，replacement 必须重新请求并由 watcher 重新验证后 grant；watcher 只管理调度线程生命周期、unit cursor 和 lane grant/wait/release，不调度 worker、不运行 gate、不合并 PR；不得把 read_thread/list_threads/thread preview 当状态数据库，不得读取 retired/systemError/abandoned thread turns，不得把完整 dispatch table、lane table、report、gate output 或 shell output 塞进 prompt 或跨线程正文；所有 watcher 输出必须包含中文 human_summary，且 next_owner=watcher 时必须先执行动作再总结。"
